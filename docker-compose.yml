version: '3.8'

services:
  moderator:
    build: ./moderator
    container_name: ai_moderator
    environment:
      # The REAL API key stays here, safe in the moderator
      - API_ENDPOINT=${API_ENDPOINT}
      - API_KEY=${API_KEY} 
    ports:
      - "8000:8000"
    networks:
      - sandbox_net

  agent:
    build: ./agent
    container_name: ai_agent
    depends_on:
      - moderator
    environment:
      # The agent is tricked into thinking the moderator is the Gemini API
      - GEMINI_API_BASE_URL=http://moderator:8000
      - GEMINI_API_KEY=dummy_key_not_needed
    volumes:
      # Mounts the local workspace folder to the container's /app/workspace
      - ./agent:/app/agent
    working_dir: /app/agent
    
    # Security & Sandboxing
    user: "1000:1000" # Runs as a non-root user
    cap_drop:
      - ALL # Strips high-level Linux privileges
    deploy:
      resources:
        limits:
          cpus: '2.0'      # Limits the agent to 2 CPU cores
          memory: 4G       # Prevents OOM crashes on your host machine
    networks:
      - sandbox_net

networks:
  sandbox_net:
    driver: bridge