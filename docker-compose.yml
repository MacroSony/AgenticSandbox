services:
  moderator:
    build: ./moderator
    container_name: ai_moderator
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # The REAL API key stays here, safe in the moderator
      API_ENDPOINT: ${UPSTREAM_API_ENDPOINT:-http://host.docker.internal:8317}
      API_KEY: ${API_KEY}
      AGENT_TOKEN: ${AGENT_TOKEN}
    volumes:
      - ./moderator/data:/app/data

  agent:
    build: ./agent
    container_name: ai_agent
    depends_on:
      - moderator
    environment:
      # Services communicate over Docker's internal network using service names
      GEMINI_API_BASE_URL: http://moderator:8000
      GEMINI_API_KEY: ${AGENT_TOKEN}
      AGENT_ROOT: /app/agent
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      # Force Git to use our isolated deploy key and ignore host key prompts
      GIT_SSH_COMMAND: "ssh -i /app/secrets/deploy_key -o StrictHostKeyChecking=no"
      GIT_AUTHOR_NAME: ${GIT_USER_NAME:-agent}
      GIT_AUTHOR_EMAIL: ${GIT_USER_EMAIL:-agent@example.com}
      GIT_COMMITTER_NAME: ${GIT_USER_NAME:-agent}
      GIT_COMMITTER_EMAIL: ${GIT_USER_EMAIL:-agent@example.com}
    volumes:
      # Mount only the agent workspace to prevent reading host repo secrets.
      - ./agent:/app/agent:rw
      # Mount the submodule git data so git commands work inside the container
      - ./.git/modules/agent:/app/.git/modules/agent:rw
      # Mount the dedicated deploy key securely
      - ./agent_deploy_key:/app/secrets/deploy_key:ro
    working_dir: /app/agent

    # Security & Sandboxing
    user: "1000:1000" # Runs as a non-root user
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    cpus: 2.0
    mem_limit: 4g
    cap_drop:
      - ALL # Strips high-level Linux privileges